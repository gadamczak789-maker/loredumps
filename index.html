<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loredumps</title>

    <style>

        body {

            margin: 0;
            padding: 0;

            width: 100vw;
            height: 100vh;

            background: black;

            overflow: hidden;

            display: flex;
            justify-content: center;
            align-items: center;

            font-family: Courier New, monospace;

            position: relative;
        }

        .mainText {

            color: white;

            font-size: 2rem;

            letter-spacing: 4px;

            text-align: center;
        }

        .hiddenText {

            position: absolute;

            bottom: 8px;
            width: 100%;

            text-align: center;

            font-size: 0.55rem;

            color: #050505;

            letter-spacing: 2px;

            user-select: none;
        }

    </style>

</head>
<body>

    <div class="mainText">
        What is the worlds name?
    </div>

    <div class="hiddenText">
        the urls, use the urls
    </div>

</body>
</html>
