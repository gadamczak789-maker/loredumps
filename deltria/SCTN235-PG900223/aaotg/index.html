<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>83-STINUZ-2.ndmoon</title>

    <link rel="stylesheet" href="../../../global.css">

    <style>

        body {

            overflow-y: auto;
        }

        .galleryContainer {

            width: 100%;

            display: flex;
            flex-direction: column;

            align-items: center;

            gap: 60px;

            padding: 60px 0;
        }

        .glitchImageContainer {

            position: relative;

            width: 80%;
            max-width: 900px;

            overflow: hidden;

            border: 1px solid #111;

            background: black;
        }

        .glitchImage {

            width: 100%;

            display: block;

            filter:
                grayscale(1)
                contrast(1.35)
                brightness(0.9);

            animation: imageFlicker 0.12s infinite;
        }

        .glitchImageContainer::before,
        .glitchImageContainer::after {

            content: "";

            position: absolute;

            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            pointer-events: none;

            background:
                repeating-linear-gradient(
                    0deg,
                    rgba(255,255,255,0.02),
                    rgba(255,255,255,0.02) 1px,
                    transparent 1px,
                    transparent 3px
                );

            mix-blend-mode: screen;
        }

        .glitchImageContainer::after {

            animation: imageShift 0.18s infinite;

            opacity: 0.12;
        }

        @keyframes imageShift {

            0% {
                transform: translate(0px, 0px);
            }

            25% {
                transform: translate(3px, -2px);
            }

            50% {
                transform: translate(-3px, 1px);
            }

            75% {
                transform: translate(2px, 2px);
            }

            100% {
                transform: translate(0px, 0px);
            }
        }

        @keyframes imageFlicker {

            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.96;
            }

            100% {
                opacity: 1;
            }
        }

    </style>

</head>
<body>

    <div class="galleryContainer">

        <div class="glitchImageContainer">
            <img src="histeaching.jpg" class="glitchImage">
        </div>

        <div class="glitchImageContainer">
            <img src="Letter024.jpg" class="glitchImage">
        </div>

        <div class="glitchImageContainer">
            <img src="Assemblage_of_the_glorified.jpg" class="glitchImage">
        </div>

        <div class="glitchImageContainer">
            <img src="Page-7.jpg" class="glitchImage">
        </div>

    </div>

</body>
</html>
