<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>83-STINUZ-2.ndmoon</title>

    <link rel="stylesheet" href="../../../global.css">

    <style>

        body {

            overflow: hidden;

            background: black;
        }

        .imageStage {

            position: relative;

            width: 100vw;
            height: 100vh;

            overflow: hidden;
        }

        .glitchImage {

            position: absolute;

            top: 50%;
            left: 50%;

            transform: translate(-50%, -50%);

            max-width: 85%;
            max-height: 85%;

            opacity: 0;

            transition: opacity 1.8s ease;

            filter:
                grayscale(1)
                contrast(1.35)
                brightness(0.9);

            animation:
                imageFlicker 0.12s infinite;
        }

        .glitchImage.active {

            opacity: 0.92;
        }

        .glitchImage::after {

            content: "";
        }

        @keyframes imageFlicker {

            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.96;
            }

            100% {
                opacity: 1;
            }
        }

        body.glitch {

            filter: brightness(1.08);
        }

    </style>

</head>
<body>

    <div class="imageStage">

        <img src="histeaching.jpg" class="glitchImage">
        <img src="Letter024.jpg" class="glitchImage">
        <img src="Assemblage_of_the_glorified.jpg" class="glitchImage">
        <img src="Page-7.jpg" class="glitchImage">

    </div>

    <script>

        const images = document.querySelectorAll(".glitchImage");

        let currentImage = null;

        function cycleImages() {

            if (currentImage) {
                currentImage.classList.remove("active");
            }

            const randomImage =
                images[Math.floor(Math.random() * images.length)];

            currentImage = randomImage;

            currentImage.classList.add("active");

            const visibleTime =
                2500 + Math.random() * 3000;

            setTimeout(() => {

                currentImage.classList.remove("active");

            }, visibleTime);

            const nextTime =
                5000 + Math.random() * 5000;

            setTimeout(cycleImages, nextTime);
        }

        setTimeout(cycleImages, 3000);

        /* Random screen glitches */

        setInterval(() => {

            document.body.classList.add("glitch");

            setTimeout(() => {
                document.body.classList.remove("glitch");
            }, 120);

        }, 4000 + Math.random() * 4000);

    </script>

</body>
</html>
