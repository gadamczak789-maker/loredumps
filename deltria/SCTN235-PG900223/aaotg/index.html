<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>83-STINUZ-2.ndmoon</title>

    <link rel="stylesheet" href="../../../global.css">

    <style>

        body {

            margin: 0;
            padding: 0;

            width: 100vw;
            height: 100vh;

            overflow: hidden;

            background: black;
        }

        .imageStage {

            position: relative;

            width: 100vw;
            height: 100vh;

            overflow: hidden;
        }

        .glitchImage {

            position: absolute;

            top: 50%;
            left: 50%;

            transform: translate(-50%, -50%);

            max-width: 85%;
            max-height: 85%;

            object-fit: contain;

            opacity: 0;

            pointer-events: none;

            transition: opacity 1.5s ease;

            filter:
                grayscale(1)
                contrast(1.35)
                brightness(0.9);

            animation:
                imageFlicker 0.12s infinite;
        }

        .glitchImage.active {

            opacity: 0.92;
        }

        @keyframes imageFlicker {

            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.96;
            }

            100% {
                opacity: 1;
            }
        }

        body.glitch {

            filter: brightness(1.08);
        }

    </style>

</head>
<body>

    <div class="imageStage">

        <img src="histeaching.jpg" class="glitchImage">
        <img src="letter024.jpg" class="glitchImage">
        <img src="assemblage.jpg" class="glitchImage">
        <img src="page7.jpg" class="glitchImage">

    </div>

    <script>

        const images =
            document.querySelectorAll(".glitchImage");

        let currentIndex = -1;

        function showRandomImage() {

            /* Hide current image */

            if (currentIndex >= 0) {

                images[currentIndex]
                    .classList.remove("active");
            }

            /* Pick new image */

            let nextIndex;

            do {

                nextIndex =
                    Math.floor(Math.random() * images.length);

            } while (
                nextIndex === currentIndex
            );

            currentIndex = nextIndex;

            /* Small delay before new image appears */

            setTimeout(() => {

                images[currentIndex]
                    .classList.add("active");

            }, 1200);

            /* Hide after visible duration */

            setTimeout(() => {

                images[currentIndex]
                    .classList.remove("active");

            }, 5200);

            /* Restart cycle */

            setTimeout(showRandomImage, 8000);
        }

        /* Initial start delay */

        setTimeout(showRandomImage, 2000);

        /* Random screen glitches */

        setInterval(() => {

            document.body.classList.add("glitch");

            setTimeout(() => {

                document.body.classList.remove("glitch");

            }, 120);

        }, 4000 + Math.random() * 4000);

    </script>

</body>
</html>
