<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>83-STINUZ-2.ndmoon</title>

    <link rel="stylesheet" href="../../../global.css">

    <style>

    body {

        margin: 0;
        padding: 0;

        width: 100vw;
        height: 100vh;

        overflow: hidden;

        background: black;
    }

    .imageStage {

        position: relative;

        width: 100vw;
        height: 100vh;

        overflow: hidden;
    }

    .glitchImage {

        position: absolute;

        top: 50%;
        left: 50%;

        transform: translate(-50%, -50%);

        max-width: 85%;
        max-height: 85%;

        object-fit: contain;

        opacity: 0;

        pointer-events: none;

        transition: opacity 1.5s ease;

        filter:
            grayscale(1)
            contrast(1.35)
            brightness(0.9);

        /* IMPORTANT */

        visibility: hidden;
    }

    .glitchImage.active {

        opacity: 0.92;

        visibility: visible;

        animation:
            activeFlicker 0.12s infinite;
    }

    @keyframes activeFlicker {

        0% {
            filter:
                grayscale(1)
                contrast(1.35)
                brightness(0.9);
        }

        50% {
            filter:
                grayscale(1)
                contrast(1.45)
                brightness(1);
        }

        100% {
            filter:
                grayscale(1)
                contrast(1.35)
                brightness(0.9);
        }
    }

    body.glitch {

        filter: brightness(1.08);
    }

</style>

</head>
<body>

    <div class="imageStage">

        <img src="histeaching.jpg" class="glitchImage">
        <img src="letter024.jpg" class="glitchImage">
        <img src="assemblage.jpg" class="glitchImage">
        <img src="page7.jpg" class="glitchImage">

    </div>

    <script>

    const images =
        document.querySelectorAll(".glitchImage");

    let currentIndex = -1;

    function showRandomImage() {

        /* Hide ALL images first */

        images.forEach(img => {

            img.classList.remove("active");

        });

        /* Pick a new image */

        let nextIndex;

        do {

            nextIndex =
                Math.floor(Math.random() * images.length);

        } while (
            nextIndex === currentIndex
        );

        currentIndex = nextIndex;

        /* Delay before showing */

        setTimeout(() => {

            images[currentIndex]
                .classList.add("active");

        }, 1000);

        /* Hide after a few seconds */

        setTimeout(() => {

            images[currentIndex]
                .classList.remove("active");

        }, 5000);

        /* Repeat cycle */

        setTimeout(showRandomImage, 8000);
    }

    /* Initial delay */

    setTimeout(showRandomImage, 2000);

    /* Random screen glitches */

    setInterval(() => {

        document.body.classList.add("glitch");

        setTimeout(() => {

            document.body.classList.remove("glitch");

        }, 120);

    }, 4000 + Math.random() * 4000);

</script>

</body>
</html>
